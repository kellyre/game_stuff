<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Floor 13</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #d8d2c3;
    --panel: #eee6d7;
    --ink: #24211c;
    --muted: #6f675c;
    --line: #b8ad9b;
    --accent: #d39124;
    --accent2: #4d6a70;
    --shadow: 0 1px 2px rgba(0,0,0,.12), 0 18px 44px rgba(64,52,32,.22);
    --metal: #c7c1b6;
    --metal-dark: #8e887e;
    --door: #bdb6aa;
    --door-edge: #726c63;
    --display: #171b17;
    --display-lit: #f2b642;
    --scene-bg: #f3efe5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161512;
      --panel: #24211c;
      --ink: #ece4d6;
      --muted: #b0a696;
      --line: #4a4339;
      --accent: #f0ad3b;
      --accent2: #8ab0b6;
      --shadow: 0 1px 2px rgba(0,0,0,.45), 0 18px 44px rgba(0,0,0,.48);
      --metal: #4a463f;
      --metal-dark: #2d2a26;
      --door: #37332d;
      --door-edge: #6f675b;
      --display: #080a08;
      --display-lit: #ffc85b;
      --scene-bg: #201e1a;
    }
  }
  * { box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,.28), transparent 23rem),
      linear-gradient(120deg, rgba(0,0,0,.08), transparent 35%),
      var(--bg);
    color: var(--ink);
    font: 16px/1.55 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .elevator {
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(16rem, 23rem) minmax(18rem, 1fr);
    gap: clamp(1rem, 3vw, 2rem);
    padding: clamp(1rem, 3vw, 2.25rem);
    max-width: 78rem;
    margin: 0 auto;
    align-items: stretch;
  }
  .panel, .shaft {
    border: 1px solid color-mix(in srgb, var(--line), #000 12%);
    box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,.18);
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.07) 0 1px, rgba(0,0,0,.025) 1px 4px),
      linear-gradient(140deg, var(--panel), color-mix(in srgb, var(--panel), #000 10%));
  }
  .panel {
    border-radius: 1.1rem;
    padding: clamp(1rem, 2.5vw, 1.45rem);
    display: flex;
    flex-direction: column;
    gap: 1rem;
    position: relative;
    overflow: hidden;
  }
  .panel.flicker { animation: flicker .8s steps(2, jump-none); }
  @keyframes flicker {
    0%, 12%, 28%, 44%, 100% { filter: brightness(1); }
    8%, 22%, 39% { filter: brightness(.48); }
    55% { filter: brightness(1.35); }
  }
  .back { color: var(--muted); text-decoration: none; font-size: .88rem; width: fit-content; }
  .back:hover { color: var(--accent); }
  h1 { margin: .15rem 0 0; font-size: clamp(2rem, 6vw, 3.4rem); line-height: .94; letter-spacing: -.055em; }
  .tagline { margin: 0; color: var(--muted); max-width: 24rem; }
  .status-card {
    border: 1px solid var(--line);
    background: color-mix(in srgb, var(--panel), #fff 15%);
    border-radius: .75rem;
    padding: .85rem;
    color: var(--muted);
    font-size: .92rem;
  }
  @media (prefers-color-scheme: dark) {
    .status-card { background: color-mix(in srgb, var(--panel), #fff 4%); }
  }
  .status-card strong { display: block; color: var(--ink); font-size: .78rem; text-transform: uppercase; letter-spacing: .12em; margin-bottom: .25rem; }
  .button-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(3.25rem, 1fr));
    gap: .7rem;
    margin-top: auto;
  }
  button {
    font: inherit;
  }
  .floor-btn, .service-btn {
    min-height: 3.3rem;
    border-radius: 50%;
    border: 1px solid color-mix(in srgb, var(--line), #000 30%);
    background:
      radial-gradient(circle at 35% 28%, rgba(255,255,255,.68), rgba(255,255,255,.08) 35%, rgba(0,0,0,.28) 100%),
      var(--metal);
    color: var(--ink);
    cursor: pointer;
    font-weight: 800;
    box-shadow: inset 0 -4px 8px rgba(0,0,0,.2), inset 0 2px 3px rgba(255,255,255,.45), 0 2px 3px rgba(0,0,0,.17);
    transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    touch-action: manipulation;
  }
  .floor-btn:hover, .service-btn:hover { transform: translateY(-1px); filter: brightness(1.06); }
  .floor-btn:active, .floor-btn.holding, .service-btn:active { transform: translateY(1px); filter: brightness(.88); }
  .floor-btn.active {
    background:
      radial-gradient(circle at 36% 28%, #fff6b8, #e9a42c 44%, #70480e 100%);
    color: #201305;
    box-shadow: 0 0 18px rgba(242,182,66,.65), inset 0 -4px 8px rgba(0,0,0,.22);
  }
  .floor-btn.secret {
    opacity: .78;
    transform: rotate(-2deg);
    background: radial-gradient(circle at 36% 28%, #eee, #a89367 47%, #3a3021 100%);
  }
  .floor-btn.secret[hidden] { display: none; }
  .service-btn {
    font-size: .78rem;
    font-weight: 700;
    color: var(--muted);
    min-height: 2.85rem;
  }
  .service-btn.noop { animation: none; }
  .service-btn.noop.flash { animation: noop .32s ease; }
  @keyframes noop { 50% { box-shadow: 0 0 14px rgba(255,255,255,.35), inset 0 -4px 8px rgba(0,0,0,.2); } }
  .mute {
    margin-top: .2rem;
    min-height: 2.6rem;
    border-radius: .7rem;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
  }
  .mute:hover { color: var(--ink); border-color: var(--accent); }
  .shaft {
    min-height: min(42rem, calc(100vh - 4rem));
    border-radius: 1.2rem;
    padding: clamp(.9rem, 2vw, 1.4rem);
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: .9rem;
    position: relative;
  }
  .indicator {
    width: min(24rem, 80%);
    justify-self: center;
    background: var(--display);
    color: var(--display-lit);
    border: 3px solid var(--metal-dark);
    border-radius: .35rem;
    min-height: 4rem;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: .5rem;
    padding: .45rem .75rem;
    box-shadow: inset 0 0 12px rgba(0,0,0,.8), 0 1px 0 rgba(255,255,255,.18);
    font-family: "Courier New", ui-monospace, monospace;
  }
  .arrow { color: color-mix(in srgb, var(--display-lit), transparent 45%); font-size: 1.3rem; }
  .arrow.lit { color: var(--display-lit); text-shadow: 0 0 10px currentColor; }
  #floorDisplay {
    text-align: center;
    font-size: clamp(2rem, 6vw, 3.1rem);
    font-weight: 800;
    letter-spacing: .05em;
    text-shadow: 0 0 8px rgba(242,182,66,.35);
  }
  .doorway {
    position: relative;
    overflow: hidden;
    border: 6px solid var(--metal-dark);
    border-radius: .55rem;
    background: var(--scene-bg);
    min-height: 22rem;
    box-shadow: inset 0 0 44px rgba(0,0,0,.3);
  }
  .scene {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: clamp(1.1rem, 4vw, 3rem);
    opacity: 0;
    transform: scale(.98);
    transition: opacity .24s ease .16s, transform .32s ease .16s;
  }
  .doorway.open .scene { opacity: 1; transform: scale(1); }
  .vignette {
    width: min(33rem, 100%);
    min-height: 70%;
    display: grid;
    align-content: center;
    gap: 1rem;
    padding: clamp(1rem, 3vw, 1.6rem);
    border: 1px solid color-mix(in srgb, var(--line), transparent 20%);
    background:
      linear-gradient(rgba(255,255,255,.08), rgba(0,0,0,.03)),
      var(--panel);
    color: var(--ink);
    box-shadow: 0 16px 34px rgba(0,0,0,.18);
  }
  .vignette svg { width: 100%; height: auto; max-height: 14rem; color: var(--accent2); }
  .caption { margin: 0; font-family: Georgia, "Times New Roman", serif; font-size: clamp(1.05rem, 2vw, 1.35rem); line-height: 1.45; text-wrap: pretty; }
  .floor-label { margin: 0; color: var(--muted); text-transform: uppercase; font-size: .76rem; letter-spacing: .14em; font-weight: 800; }
  .door {
    position: absolute;
    z-index: 5;
    top: 0; bottom: 0;
    width: 50.2%;
    background:
      linear-gradient(90deg, rgba(255,255,255,.10), transparent 25%, rgba(0,0,0,.08) 70%, rgba(255,255,255,.07)),
      repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, rgba(0,0,0,.03) 1px 6px),
      var(--door);
    transition: transform .55s cubic-bezier(.55,.03,.25,1);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.16), inset 0 0 30px rgba(0,0,0,.16);
  }
  .door.left { left: 0; border-right: 2px solid var(--door-edge); }
  .door.right { right: 0; border-left: 2px solid var(--door-edge); }
  .doorway.open .door.left { transform: translateX(-100%); }
  .doorway.open .door.right { transform: translateX(100%); }
  .doorway.shudder .door { animation: shudder .45s ease; }
  @keyframes shudder { 25% { filter: brightness(.9); } 45% { transform: translateX(var(--jitter, 0)); } 75% { filter: brightness(1.05); } }
  .doorway.open .door.left { --jitter: -1%; }
  .doorway.open .door.right { --jitter: 1%; }
  .threshold {
    color: var(--muted);
    text-align: center;
    font-size: .84rem;
  }
  .glitch #floorDisplay { animation: glitch .18s steps(2) infinite; }
  @keyframes glitch { 50% { opacity: .5; transform: translateX(1px); } }
  @media (max-width: 760px) {
    .elevator { grid-template-columns: 1fr; padding: .75rem; }
    .panel { order: 2; }
    .shaft { min-height: 28rem; order: 1; }
    .button-grid { grid-template-columns: repeat(4, minmax(3rem, 1fr)); }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
  }
</style>
</head>
<body>
<main class="elevator" id="app">
  <section class="panel" id="panel" aria-label="Elevator control panel">
    <a class="back" href="index.html">&larr; Games and Stuff</a>
    <div>
      <h1>Floor 13</h1>
      <p class="tagline">There's no button for it. That doesn't mean it isn't there.</p>
    </div>
    <div class="status-card" aria-live="polite">
      <strong>Car status</strong>
      <span id="statusText">Doors closed. Choose a floor.</span>
    </div>
    <div class="button-grid" id="buttonGrid">
      <button class="floor-btn" data-floor="12">12</button>
      <button class="floor-btn" data-floor="11">11</button>
      <button class="floor-btn" data-floor="10">10</button>
      <button class="floor-btn" data-floor="9">9</button>
      <button class="floor-btn" data-floor="8">8</button>
      <button class="floor-btn" data-floor="7">7</button>
      <button class="floor-btn" data-floor="6">6</button>
      <button class="floor-btn" data-floor="5">5</button>
      <button class="floor-btn" data-floor="4">4</button>
      <button class="floor-btn" data-floor="3">3</button>
      <button class="floor-btn" data-floor="2">2</button>
      <button class="floor-btn" data-floor="1">1</button>
      <button class="service-btn" data-service="alarm">ALARM</button>
      <button class="floor-btn" data-floor="B">B</button>
      <button class="service-btn" data-service="phone">PHONE</button>
      <button class="service-btn" data-service="open">OPEN</button>
      <button class="floor-btn secret" data-floor="13" id="secretBtn" hidden>13</button>
      <button class="service-btn" data-service="close">CLOSE</button>
    </div>
    <button class="mute" id="muteBtn" aria-pressed="false">Sound on</button>
  </section>

  <section class="shaft" aria-label="Elevator doors and floor indicator">
    <div class="indicator" id="indicator" aria-live="polite">
      <span class="arrow" id="downArrow">&#9660;</span>
      <span id="floorDisplay">1</span>
      <span class="arrow" id="upArrow">&#9650;</span>
    </div>
    <div class="doorway" id="doorway">
      <div class="scene" id="scene">
        <article class="vignette" id="vignette">
          <p class="floor-label" id="floorLabel">Floor 1</p>
          <div id="sceneArt" aria-hidden="true"></div>
          <p class="caption" id="caption">The elevator is between moments.</p>
        </article>
      </div>
      <div class="door left" aria-hidden="true"></div>
      <div class="door right" aria-hidden="true"></div>
    </div>
    <div class="threshold">Input is ignored while the car is moving. This is for everyone's comfort.</div>
  </section>
</main>
<script src="floor-thirteen.js"></script>
</body>
</html>
